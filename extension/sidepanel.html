<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #fff;
        color: #1a1a1a;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 14px 10px;
        border-bottom: 1px solid #e5e5e5;
        flex-shrink: 0;
      }

      header h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #111;
        margin-bottom: 4px;
      }

      #tab-info {
        font-size: 11px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #log {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      .empty {
        padding: 24px 14px;
        color: #aaa;
        font-size: 12px;
      }

      .entry {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 14px;
        border-bottom: 1px solid #f0f0f0;
      }

      .entry:last-child { border-bottom: none; }

      .status-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
      }

      .status-start .status-icon { color: #888; }
      .status-done .status-icon { color: #16a34a; }
      .status-error .status-icon { color: #dc2626; }

      .entry-body { flex: 1; min-width: 0; }

      .command-name {
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 12px;
        font-weight: 500;
        color: #2563eb;
      }

      .status-error .command-name { color: #dc2626; }

      .command-detail {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .error-msg {
        font-size: 11px;
        color: #dc2626;
        margin-top: 2px;
        word-break: break-word;
      }

      .timestamp {
        flex-shrink: 0;
        font-size: 10px;
        color: #bbb;
        margin-top: 2px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spinning { display: inline-block; animation: spin 0.8s linear infinite; }
    </style>
  </head>
  <body>
    <header>
      <h1>brow-use</h1>
      <div id="tab-info">No active tab</div>
    </header>
    <div id="log"><div class="empty">No commands yet for this tab.</div></div>
    <script src="sidepanel.js"></script>
  </body>
</html>
